<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechStore Admin — Pesanan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    dark: { 900:'#0a0f1e', 800:'#0d1526', 700:'#111c33', 600:'#1a2744' }
  }}}};
</script>
<style>
  body{background:#0a0f1e;font-family:'Inter',sans-serif;}
  .modal-overlay{background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
</style>
</head>
<body class="text-slate-200 pb-20 lg:pb-0">
<div id="sidebar-container"></div>

<div class="lg:pl-64 min-h-screen">
  <header class="sticky top-0 z-30 bg-dark-800/90 backdrop-blur-lg border-b border-slate-800 px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-white">Manajemen Pesanan</h1>
      <p class="text-slate-500 text-sm">Kelola seluruh pesanan masuk</p>
    </div>
  </header>

  <main class="p-6">
    <!-- Filter -->
    <div class="flex flex-wrap gap-2 mb-5">
      <button onclick="filterStatus('')" class="status-filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-cyan-500/20 text-cyan-400 border border-cyan-500/30" data-status="">Semua</button>
      <button onclick="filterStatus('Diproses')" class="status-filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-dark-800 text-slate-400 border border-slate-700" data-status="Diproses">Diproses</button>
      <button onclick="filterStatus('Dikirim')" class="status-filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-dark-800 text-slate-400 border border-slate-700" data-status="Dikirim">Dikirim</button>
      <button onclick="filterStatus('Selesai')" class="status-filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-dark-800 text-slate-400 border border-slate-700" data-status="Selesai">Selesai</button>
      <button onclick="filterStatus('Dibatalkan')" class="status-filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-dark-800 text-slate-400 border border-slate-700" data-status="Dibatalkan">Dibatalkan</button>
    </div>

    <!-- Table -->
    <div class="bg-dark-800 rounded-2xl border border-slate-800 overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-800 text-slate-400 text-xs uppercase">
            <th class="text-left px-5 py-3">Transaksi</th>
            <th class="text-left px-5 py-3">Pelanggan</th>
            <th class="text-center px-5 py-3">Item</th>
            <th class="text-right px-5 py-3">Total</th>
            <th class="text-center px-5 py-3">Status</th>
            <th class="text-center px-5 py-3">Tanggal</th>
            <th class="text-center px-5 py-3">Aksi</th>
          </tr>
        </thead>
        <tbody id="orders-table">
          <tr><td colspan="7" class="text-center py-10 text-slate-500">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Detail Modal -->
<div id="order-modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
  <div class="bg-dark-800 rounded-2xl border border-slate-700 w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="sticky top-0 bg-dark-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between">
      <h3 class="text-lg font-bold text-white">Detail Pesanan</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl">✕</button>
    </div>
    <div id="order-detail" class="p-6 space-y-4"></div>
  </div>
</div>

<script src="sidebar.js"></script>
<script src="admin.js"></script>
<script>
requireAuth();
renderAdminNav();
loadSidebar('orders');

let currentStatus = '';

function filterStatus(status) {
  currentStatus = status;
  document.querySelectorAll('.status-filter-btn').forEach(b => {
    if (b.dataset.status === status) {
      b.className = 'status-filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-cyan-500/20 text-cyan-400 border border-cyan-500/30';
    } else {
      b.className = 'status-filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-dark-800 text-slate-400 border border-slate-700';
    }
  });
  loadOrders();
}

async function loadOrders() {
  let url = '/api/orders/admin/all?limit=100';
  if (currentStatus) url += `&status=${currentStatus}`;

  const res = await api('GET', url);
  const tbody = document.getElementById('orders-table');
  if (!res || !res.success || res.data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-slate-500">Tidak ada pesanan</td></tr>`;
    return;
  }

  tbody.innerHTML = res.data.map(o => `
    <tr class="border-b border-slate-800/50 hover:bg-dark-700/50 transition-all">
      <td class="px-5 py-3 font-mono text-cyan-400 text-xs">${o.tx_id}</td>
      <td class="px-5 py-3">
        <p class="text-slate-200 font-medium">${o.user_name}</p>
        <p class="text-slate-500 text-xs">${o.user_email}</p>
      </td>
      <td class="px-5 py-3 text-center text-slate-400">${o.item_count}</td>
      <td class="px-5 py-3 text-right text-slate-200 font-semibold">${rupiah(o.total)}</td>
      <td class="px-5 py-3 text-center">${statusBadge(o.status)}</td>
      <td class="px-5 py-3 text-center text-slate-500 text-xs">${dateId(o.created_at)}</td>
      <td class="px-5 py-3 text-center">
        <button onclick="viewOrder(${o.id})" class="px-3 py-1.5 rounded-lg bg-cyan-500/10 text-cyan-400 text-xs font-medium hover:bg-cyan-500/20">Detail</button>
      </td>
    </tr>`).join('');
}

async function viewOrder(id) {
  const res = await api('GET', `/api/orders/admin/${id}`);
  if (!res || !res.success) { toast('Gagal memuat detail pesanan', 'error'); return; }

  const o = res.data;
  document.getElementById('order-detail').innerHTML = `
    <div class="space-y-1">
      <p class="text-slate-500 text-xs">ID Transaksi</p>
      <p class="text-cyan-400 font-mono font-bold">${o.tx_id}</p>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <p class="text-slate-500 text-xs">Pelanggan</p>
        <p class="text-slate-200 font-medium">${o.user_name}</p>
        <p class="text-slate-500 text-xs">${o.user_email}</p>
      </div>
      <div>
        <p class="text-slate-500 text-xs">Status</p>
        <select id="status-select" class="mt-1 px-3 py-1.5 bg-dark-700 border border-slate-700 rounded-lg text-sm text-slate-200">
          ${['Diproses','Dikirim','Selesai','Dibatalkan'].map(s => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
    <div>
      <p class="text-slate-500 text-xs mb-1">Alamat Pengiriman</p>
      <p class="text-slate-300 text-sm">${o.ship_name} • ${o.ship_phone}</p>
      <p class="text-slate-300 text-sm">${o.ship_address}, ${o.ship_city} ${o.ship_postal}</p>
    </div>
    <div>
      <p class="text-slate-500 text-xs mb-2">Produk Dipesan</p>
      <div class="space-y-2">
        ${o.items.map(it => `
          <div class="flex items-center gap-3 bg-dark-700 rounded-xl p-2.5">
            <img src="${it.image || ''}" class="w-10 h-10 rounded-lg object-cover bg-dark-600" onerror="this.src='https://via.placeholder.com/40'">
            <div class="flex-1 min-w-0">
              <p class="text-slate-200 text-xs font-medium line-clamp-1">${it.name}</p>
              <p class="text-slate-500 text-xs">x${it.quantity}</p>
            </div>
            <p class="text-slate-300 text-xs font-semibold">${rupiah(it.price * it.quantity)}</p>
          </div>`).join('')}
      </div>
    </div>
    <div class="flex items-center justify-between pt-3 border-t border-slate-700">
      <p class="text-slate-400 text-sm">${o.payment_method}</p>
      <p class="text-white font-bold text-lg">${rupiah(o.total)}</p>
    </div>
    <button onclick="updateStatus(${o.id})" class="w-full py-2.5 rounded-xl bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-semibold text-sm hover:opacity-90">
      Update Status
    </button>`;

  document.getElementById('order-modal').classList.remove('hidden');
}

async function updateStatus(id) {
  const status = document.getElementById('status-select').value;
  const res = await api('PATCH', `/api/orders/admin/${id}/status`, { status });
  if (res && res.success) {
    toast('Status pesanan diperbarui!');
    closeModal();
    loadOrders();
  } else {
    toast(res?.message || 'Gagal update status', 'error');
  }
}

function closeModal() { document.getElementById('order-modal').classList.add('hidden'); }

loadOrders();
</script>
</body>
</html>
