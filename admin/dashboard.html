<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechStore Admin — Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    dark: { 900:'#0a0f1e', 800:'#0d1526', 700:'#111c33', 600:'#1a2744' }
  }}}};
</script>
<style>body{background:#0a0f1e;font-family:'Inter',sans-serif;}</style>
</head>
<body class="text-slate-200">
<div id="sidebar-container"></div>

<div class="lg:pl-64 min-h-screen">
  <!-- Topbar -->
  <header class="sticky top-0 z-30 bg-dark-800/90 backdrop-blur-lg border-b border-slate-800 px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-white">Dashboard</h1>
      <p class="text-slate-500 text-sm">Ringkasan performa toko Anda</p>
    </div>
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-cyan-500 to-indigo-600 flex items-center justify-center font-bold text-white" id="avatar">A</div>
      <span id="admin-name" class="text-slate-300 font-medium hidden sm:block">Admin</span>
    </div>
  </header>

  <main class="p-6 space-y-6">
    <!-- Stat Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
      <div class="bg-dark-800 rounded-2xl border border-slate-800 p-5">
        <div class="flex items-center justify-between mb-3">
          <span class="text-2xl">💰</span>
          <span class="text-emerald-400 text-xs font-semibold bg-emerald-500/10 px-2 py-1 rounded-full">Revenue</span>
        </div>
        <p id="stat-revenue" class="text-2xl font-black text-white">Rp 0</p>
        <p class="text-slate-500 text-xs mt-1">Total pendapatan</p>
      </div>
      <div class="bg-dark-800 rounded-2xl border border-slate-800 p-5">
        <div class="flex items-center justify-between mb-3">
          <span class="text-2xl">📋</span>
          <span class="text-cyan-400 text-xs font-semibold bg-cyan-500/10 px-2 py-1 rounded-full">Orders</span>
        </div>
        <p id="stat-orders" class="text-2xl font-black text-white">0</p>
        <p class="text-slate-500 text-xs mt-1">Total pesanan</p>
      </div>
      <div class="bg-dark-800 rounded-2xl border border-slate-800 p-5">
        <div class="flex items-center justify-between mb-3">
          <span class="text-2xl">📦</span>
          <span class="text-indigo-400 text-xs font-semibold bg-indigo-500/10 px-2 py-1 rounded-full">Products</span>
        </div>
        <p id="stat-products" class="text-2xl font-black text-white">0</p>
        <p class="text-slate-500 text-xs mt-1">Produk aktif</p>
      </div>
      <div class="bg-dark-800 rounded-2xl border border-slate-800 p-5">
        <div class="flex items-center justify-between mb-3">
          <span class="text-2xl">👥</span>
          <span class="text-amber-400 text-xs font-semibold bg-amber-500/10 px-2 py-1 rounded-full">Users</span>
        </div>
        <p id="stat-users" class="text-2xl font-black text-white">0</p>
        <p class="text-slate-500 text-xs mt-1">Pelanggan terdaftar</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Recent Orders -->
      <div class="bg-dark-800 rounded-2xl border border-slate-800 p-5">
        <h3 class="text-white font-bold mb-4">Pesanan Terbaru</h3>
        <div id="recent-orders" class="space-y-3">
          <p class="text-slate-500 text-sm text-center py-8">Memuat data...</p>
        </div>
      </div>

      <!-- Top Products -->
      <div class="bg-dark-800 rounded-2xl border border-slate-800 p-5">
        <h3 class="text-white font-bold mb-4">Produk Terlaris</h3>
        <div id="top-products" class="space-y-3">
          <p class="text-slate-500 text-sm text-center py-8">Memuat data...</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="sidebar.js"></script>
<script src="admin.js"></script>
<script>
requireAuth();
renderAdminNav();
loadSidebar('dashboard');

async function loadDashboard() {
  const res = await api('GET', '/api/orders/admin/stats');
  if (!res || !res.success) { toast('Gagal memuat statistik', 'error'); return; }

  const d = res.data;
  document.getElementById('stat-revenue').textContent  = rupiah(d.totalRevenue);
  document.getElementById('stat-orders').textContent   = d.totalOrders;
  document.getElementById('stat-products').textContent = d.totalProducts;
  document.getElementById('stat-users').textContent    = d.totalUsers;

  const recentEl = document.getElementById('recent-orders');
  recentEl.innerHTML = d.recentOrders.length ? d.recentOrders.map(o => `
    <div class="flex items-center justify-between py-2 border-b border-slate-800 last:border-0">
      <div>
        <p class="text-slate-200 text-sm font-medium">${o.user_name}</p>
        <p class="text-slate-500 text-xs font-mono">${o.tx_id}</p>
      </div>
      <div class="text-right">
        <p class="text-white text-sm font-semibold">${rupiah(o.total)}</p>
        ${statusBadge(o.status)}
      </div>
    </div>`).join('') : '<p class="text-slate-500 text-sm text-center py-8">Belum ada pesanan</p>';

  const topEl = document.getElementById('top-products');
  topEl.innerHTML = d.topProducts.length ? d.topProducts.map((p, i) => `
    <div class="flex items-center gap-3 py-2 border-b border-slate-800 last:border-0">
      <span class="w-7 h-7 rounded-lg bg-dark-700 flex items-center justify-center text-xs font-bold text-cyan-400">${i+1}</span>
      <div class="flex-1 min-w-0">
        <p class="text-slate-200 text-sm font-medium truncate">${p.name}</p>
        <p class="text-slate-500 text-xs">${p.sold} terjual</p>
      </div>
      <p class="text-white text-sm font-semibold">${rupiah(p.revenue)}</p>
    </div>`).join('') : '<p class="text-slate-500 text-sm text-center py-8">Belum ada data</p>';
}

loadDashboard();
</script>
</body>
</html>
