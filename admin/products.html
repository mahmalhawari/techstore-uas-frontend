<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechStore Admin — Produk</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: { colors: {
    dark: { 900:'#0a0f1e', 800:'#0d1526', 700:'#111c33', 600:'#1a2744' }
  }}}};
</script>
<style>
  body{background:#0a0f1e;font-family:'Inter',sans-serif;}
  .modal-overlay{background:rgba(0,0,0,.6);backdrop-filter:blur(4px);}
</style>
</head>
<body class="text-slate-200 pb-20 lg:pb-0">
<div id="sidebar-container"></div>

<div class="lg:pl-64 min-h-screen">
  <header class="sticky top-0 z-30 bg-dark-800/90 backdrop-blur-lg border-b border-slate-800 px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-white">Manajemen Produk</h1>
      <p class="text-slate-500 text-sm">Kelola seluruh produk toko Anda</p>
    </div>
    <button onclick="openModal()" class="px-4 py-2.5 rounded-xl bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-semibold text-sm hover:opacity-90 transition-all shadow-lg shadow-cyan-500/20">
      + Tambah Produk
    </button>
  </header>

  <main class="p-6">
    <!-- Search & Filter -->
    <div class="flex flex-col sm:flex-row gap-3 mb-5">
      <input id="search-input" type="text" placeholder="Cari produk..." oninput="loadProducts()"
        class="flex-1 px-4 py-2.5 bg-dark-800 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-600 focus:outline-none focus:border-cyan-500 text-sm">
      <select id="category-filter" onchange="loadProducts()"
        class="px-4 py-2.5 bg-dark-800 border border-slate-700 rounded-xl text-slate-200 focus:outline-none focus:border-cyan-500 text-sm">
        <option value="">Semua Kategori</option>
      </select>
    </div>

    <!-- Table -->
    <div class="bg-dark-800 rounded-2xl border border-slate-800 overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-800 text-slate-400 text-xs uppercase">
            <th class="text-left px-5 py-3">Produk</th>
            <th class="text-left px-5 py-3">Kategori</th>
            <th class="text-right px-5 py-3">Harga</th>
            <th class="text-center px-5 py-3">Stok</th>
            <th class="text-center px-5 py-3">Rating</th>
            <th class="text-center px-5 py-3">Aksi</th>
          </tr>
        </thead>
        <tbody id="products-table">
          <tr><td colspan="6" class="text-center py-10 text-slate-500">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- ── Modal Form ─────────────────────────────────── -->
<div id="product-modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4">
  <div class="bg-dark-800 rounded-2xl border border-slate-700 w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="sticky top-0 bg-dark-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between">
      <h3 id="modal-title" class="text-lg font-bold text-white">Tambah Produk</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl">✕</button>
    </div>
    <div class="p-6 space-y-4">
      <input type="hidden" id="p-id">
      <div>
        <label class="block text-slate-400 text-xs font-medium mb-1.5">Nama Produk *</label>
        <input id="p-name" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-slate-400 text-xs font-medium mb-1.5">Kategori *</label>
          <select id="p-category" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500"></select>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-medium mb-1.5">Badge</label>
          <select id="p-badge" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500">
            <option value="">-- Tidak ada --</option>
            <option>Best Seller</option><option>New</option><option>Hot</option>
            <option>Sale</option><option>Gaming</option><option>Best Value</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-slate-400 text-xs font-medium mb-1.5">Harga *</label>
          <input id="p-price" type="number" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500">
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-medium mb-1.5">Harga Asli (coret)</label>
          <input id="p-original-price" type="number" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-slate-400 text-xs font-medium mb-1.5">Stok *</label>
          <input id="p-stock" type="number" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500">
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-medium mb-1.5">Rating (0-5)</label>
          <input id="p-rating" type="number" step="0.1" min="0" max="5" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500">
        </div>
      </div>
      <div>
        <label class="block text-slate-400 text-xs font-medium mb-1.5">URL Gambar</label>
        <input id="p-image" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500" placeholder="https://...">
      </div>
      <div>
        <label class="block text-slate-400 text-xs font-medium mb-1.5">Deskripsi</label>
        <textarea id="p-description" rows="3" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500"></textarea>
      </div>
      <div>
        <label class="block text-slate-400 text-xs font-medium mb-1.5">Spesifikasi (pisahkan dengan koma)</label>
        <textarea id="p-specs" rows="2" class="w-full px-3.5 py-2.5 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 text-sm focus:outline-none focus:border-cyan-500" placeholder="RAM 16GB, SSD 512GB, ..."></textarea>
      </div>
    </div>
    <div class="sticky bottom-0 bg-dark-800 border-t border-slate-700 px-6 py-4 flex gap-3">
      <button onclick="closeModal()" class="flex-1 py-2.5 rounded-xl border border-slate-700 text-slate-300 font-medium text-sm hover:bg-dark-700">Batal</button>
      <button onclick="saveProduct()" id="save-btn" class="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-semibold text-sm hover:opacity-90">Simpan</button>
    </div>
  </div>
</div>

<script src="sidebar.js"></script>
<script src="admin.js"></script>
<script>
requireAuth();
renderAdminNav();
loadSidebar('products');

let CATEGORIES = [];
let editingId = null;

async function loadCategories() {
  const res = await api('GET', '/api/products/categories');
  if (res && res.success) {
    CATEGORIES = res.data;
    const filterSel = document.getElementById('category-filter');
    const formSel    = document.getElementById('p-category');
    filterSel.innerHTML = '<option value="">Semua Kategori</option>' + CATEGORIES.map(c => `<option value="${c.name}">${c.icon} ${c.name}</option>`).join('');
    formSel.innerHTML = CATEGORIES.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
  }
}

async function loadProducts() {
  const search = document.getElementById('search-input').value;
  const category = document.getElementById('category-filter').value;
  let url = '/api/products?limit=100';
  if (search) url += `&search=${encodeURIComponent(search)}`;
  if (category) url += `&category=${encodeURIComponent(category)}`;

  const res = await api('GET', url);
  const tbody = document.getElementById('products-table');
  if (!res || !res.success || res.data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-slate-500">Tidak ada produk ditemukan</td></tr>`;
    return;
  }

  tbody.innerHTML = res.data.map(p => `
    <tr class="border-b border-slate-800/50 hover:bg-dark-700/50 transition-all">
      <td class="px-5 py-3">
        <div class="flex items-center gap-3">
          <img src="${p.image || ''}" class="w-10 h-10 rounded-lg object-cover bg-dark-700" onerror="this.src='https://via.placeholder.com/40'">
          <div>
            <p class="text-slate-200 font-medium text-sm line-clamp-1">${p.name}</p>
            ${p.badge ? `<span class="text-xs text-cyan-400">${p.badge}</span>` : ''}
          </div>
        </div>
      </td>
      <td class="px-5 py-3 text-slate-400">${p.category}</td>
      <td class="px-5 py-3 text-right text-slate-200 font-medium">${rupiah(p.price)}</td>
      <td class="px-5 py-3 text-center">
        <span class="${p.stock > 5 ? 'text-emerald-400' : p.stock > 0 ? 'text-amber-400' : 'text-red-400'} font-semibold">${p.stock}</span>
      </td>
      <td class="px-5 py-3 text-center text-slate-400">⭐ ${p.rating}</td>
      <td class="px-5 py-3">
        <div class="flex items-center justify-center gap-2">
          <button onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="px-3 py-1.5 rounded-lg bg-cyan-500/10 text-cyan-400 text-xs font-medium hover:bg-cyan-500/20">Edit</button>
          <button onclick="deleteProduct(${p.id})" class="px-3 py-1.5 rounded-lg bg-red-500/10 text-red-400 text-xs font-medium hover:bg-red-500/20">Hapus</button>
        </div>
      </td>
    </tr>`).join('');
}

function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Tambah Produk';
  ['p-id','p-name','p-price','p-original-price','p-stock','p-rating','p-image','p-description','p-specs'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-category').selectedIndex = 0;
  document.getElementById('p-badge').selectedIndex = 0;
  document.getElementById('product-modal').classList.remove('hidden');
}

function editProduct(p) {
  editingId = p.id;
  document.getElementById('modal-title').textContent = 'Edit Produk';
  document.getElementById('p-id').value = p.id;
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-category').value = p.category_id;
  document.getElementById('p-badge').value = p.badge || '';
  document.getElementById('p-price').value = p.price;
  document.getElementById('p-original-price').value = p.original_price || '';
  document.getElementById('p-stock').value = p.stock;
  document.getElementById('p-rating').value = p.rating;
  document.getElementById('p-image').value = p.image || '';
  document.getElementById('p-description').value = p.description || '';
  document.getElementById('p-specs').value = Array.isArray(p.specs) ? p.specs.join(', ') : '';
  document.getElementById('product-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('product-modal').classList.add('hidden');
}

async function saveProduct() {
  const name = document.getElementById('p-name').value.trim();
  const category_id = document.getElementById('p-category').value;
  const price = document.getElementById('p-price').value;
  const stock = document.getElementById('p-stock').value;

  if (!name || !category_id || !price) { toast('Nama, kategori, dan harga wajib diisi!', 'error'); return; }

  const specsText = document.getElementById('p-specs').value.trim();
  const specs = specsText ? specsText.split(',').map(s => s.trim()).filter(Boolean) : [];

  const payload = {
    name, category_id: parseInt(category_id),
    price: parseInt(price),
    original_price: document.getElementById('p-original-price').value ? parseInt(document.getElementById('p-original-price').value) : null,
    stock: parseInt(stock) || 0,
    rating: parseFloat(document.getElementById('p-rating').value) || 0,
    badge: document.getElementById('p-badge').value || null,
    image: document.getElementById('p-image').value.trim() || null,
    description: document.getElementById('p-description').value.trim() || null,
    specs,
  };

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Menyimpan...';

  const res = editingId
    ? await api('PUT', `/api/products/${editingId}`, payload)
    : await api('POST', '/api/products', payload);

  btn.disabled = false; btn.textContent = 'Simpan';

  if (res && res.success) {
    toast(editingId ? 'Produk berhasil diperbarui!' : 'Produk berhasil ditambahkan!');
    closeModal();
    loadProducts();
  } else {
    toast(res?.message || 'Gagal menyimpan produk', 'error');
  }
}

async function deleteProduct(id) {
  if (!confirm('Yakin ingin menghapus produk ini?')) return;
  const res = await api('DELETE', `/api/products/${id}`);
  if (res && res.success) { toast('Produk berhasil dihapus!'); loadProducts(); }
  else { toast(res?.message || 'Gagal menghapus produk', 'error'); }
}

(async () => { await loadCategories(); await loadProducts(); })();
</script>
</body>
</html>
