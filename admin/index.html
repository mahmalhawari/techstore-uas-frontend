<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechStore Admin — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      dark: { 900:'#0a0f1e', 800:'#0d1526', 700:'#111c33', 600:'#1a2744' }
    }}}
  };
</script>
<style>
  body { background: #0a0f1e; font-family: 'Inter', sans-serif; }
  .glass { background: rgba(13,21,38,.85); backdrop-filter: blur(12px); border: 1px solid rgba(100,116,139,.2); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center gap-3 mb-4">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-500 to-indigo-600 flex items-center justify-center text-2xl shadow-lg shadow-cyan-500/30">⚡</div>
      <div>
        <h1 class="text-2xl font-black text-white tracking-tight">TechStore</h1>
        <p class="text-cyan-400 text-xs font-semibold tracking-widest uppercase">Admin Panel</p>
      </div>
    </div>
    <p class="text-slate-500 text-sm">Masuk ke dashboard admin</p>
  </div>

  <!-- Card -->
  <div class="glass rounded-3xl p-8 shadow-2xl">
    <h2 class="text-xl font-bold text-white mb-6">Login Admin</h2>

    <div id="login-error" class="hidden mb-4 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm"></div>

    <div class="space-y-4">
      <div>
        <label class="block text-slate-400 text-sm font-medium mb-2">Email</label>
        <input id="email" type="email" placeholder="admin@techstore.com"
          class="w-full px-4 py-3 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-600
            focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/30 transition-all"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div>
        <label class="block text-slate-400 text-sm font-medium mb-2">Password</label>
        <input id="password" type="password" placeholder="••••••••"
          class="w-full px-4 py-3 bg-dark-700 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-600
            focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/30 transition-all"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button onclick="doLogin()" id="login-btn"
        class="w-full py-3.5 rounded-xl bg-gradient-to-r from-cyan-500 to-indigo-600 text-white font-bold
          hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-cyan-500/20">
        Masuk ke Dashboard
      </button>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
      Default: admin@techstore.com / admin123
    </p>
  </div>
</div>

<script>
const BASE_URL = window.BACKEND_URL || 'http://localhost:3000';

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');

  if (!email || !password) { showErr('Email dan password wajib diisi.'); return; }

  btn.disabled = true; btn.textContent = 'Memproses...';

  try {
    const res  = await fetch(`${BASE_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!data.success) { showErr(data.message); return; }
    if (data.data.role !== 'admin') { showErr('Akses ditolak. Hanya admin.'); return; }

    localStorage.setItem('admin_token', data.data.token);
    localStorage.setItem('admin_user',  JSON.stringify(data.data));
    window.location.href = 'dashboard.html';
  } catch(e) {
    showErr('Gagal terhubung ke server. Pastikan backend aktif.');
  } finally {
    btn.disabled = false; btn.textContent = 'Masuk ke Dashboard';
  }
}

function showErr(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.classList.remove('hidden');
}
</script>
</body>
</html>
